<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Módulo 1: Registro de Personal</h1>
    <div class="table-responsive">
        <h2>Nuevo Empleado</h2>
        <form id="formEmpleado">
            <div class="grid-form">
                <input type="text" id="cuadrilla" placeholder="Cuadrilla" required>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="number" id="anios" placeholder="Edad/Años" required>
                <input type="number" id="peso" placeholder="Peso (kg)" required>
                <input type="number" step="0.01" id="estatura" placeholder="Estatura (m)" required>
                <input type="text" id="escolaridad" placeholder="Escolaridad" required>
                <input type="text" id="puesto" placeholder="Puesto" required>
            </div>
            <button type="submit" class="btn-principal">Agregar a la base de datos</button>
        </form>
    </div>

    <div class="table-responsive">
        <h2>Lista de Empleados</h2>
        <input type="text" id="buscarEmpleado" class="buscador" placeholder="🔍 Buscar por nombre...">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Puesto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaEmpleados"></tbody>
        </table>
    </div>

    <script type="module" src="registro.js"></script>
</body>
</html>
