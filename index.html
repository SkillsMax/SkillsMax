<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Habilidades - Industrial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Matriz de Habilidades</h1>

    <nav class="menu-navegacion">
        <button onclick="cambiarSeccion('seccion-registro')">1. Registro de Personal</button>
        <button onclick="cambiarSeccion('seccion-evaluacion')">2. Evaluación y Resultados</button>
    </nav>

    <hr>

    <section id="seccion-registro" class="apartado">
        <h2>Registrar Nuevo Empleado</h2>
        <form id="formEmpleado">
            <div class="grid-form">
                <input type="text" id="cuadrilla" placeholder="Cuadrilla" required>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="number" id="anios" placeholder="Años" required>
                <input type="number" id="peso" placeholder="Peso (kg)" required>
                <input type="number" step="0.01" id="estatura" placeholder="Estatura (m)" required>
                <input type="text" id="escolaridad" placeholder="Escolaridad" required>
                <input type="text" id="puesto" placeholder="Puesto" required>
            </div>
            <button type="submit" class="btn-principal">Agregar a la lista</button>
        </form>

        <h2>Lista de Empleados</h2>
        <input type="text" id="buscarEmpleado" class="buscador" placeholder="🔍 Buscar por nombre..." onkeyup="filtrarEmpleados()">
        <div class="table-responsive">
            <table id="tablaEmpleados">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Puesto</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <section id="seccion-evaluacion" class="apartado oculto">
        <div id="evaluacion" class="contenedor-evaluacion oculto">
            <h2 id="tituloEmpleado">Seleccione un empleado</h2>
            
            <div class="status-barra">
                <span id="estadoGuardado">✨ Listo</span>
            </div>

            <div class="controles">
                <button onclick="agregarItem('habilidades')">+ Habilidad</button>
                <button onclick="agregarItem('conocimientos')">+ Conocimiento</button>
                <button onclick="agregarItem('antropometria')">+ Antropometría</button>
            </div>
            
            <div class="table-responsive">
                <table class="matriz">
                    <thead>
                        <tr>
                            <th>Concepto</th>
                            <th>0</th><th>1</th><th>2</th><th>3</th><th>4</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoMatriz">
                        </tbody>
                </table>
            </div>
        </div>

        <h2>Resultados Finales</h2>
        <div class="controles">
            <button onclick="exportarCSV()" style="background-color: #17a2b8;">Exportar a Excel</button>
            <button onclick="limpiarTodo()" class="btn-eliminar">Borrar Todo</button>
        </div>
        <div class="table-responsive">
            <table id="tablaFinal">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Puesto</th>
                        <th>Puntaje</th>
                        <th>%</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { iniciarApp } from "./script.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNokOSiV483vppPmDwtWs0nH1evzZwbjU",
            authDomain: "matriz-de-habilidades-c4bd5.firebaseapp.com",
            databaseURL: "https://matriz-de-habilidades-c4bd5-default-rtdb.firebaseio.com",
            projectId: "matriz-de-habilidades-c4bd5",
            storageBucket: "matriz-de-habilidades-c4bd5.firebasestorage.app",
            messagingSenderId: "190967468978",
            appId: "1:190967468978:web:8e40bde48a4a2355814aab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addEventListener("DOMContentLoaded", () => {
            iniciarApp(db, ref, set, onValue);
        });
    </script>
</body>
</html>
