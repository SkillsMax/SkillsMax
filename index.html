<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registro de Personal</h1>
    <hr>
    
    <div class="table-responsive">
        <h2>Registrar Nuevo Empleado</h2>
        <form id="formEmpleado">
            <div class="grid-form">
                <input type="text" id="cuadrilla" placeholder="Cuadrilla" required>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="number" id="anios" placeholder="Años" required>
                <input type="number" id="peso" placeholder="Peso (kg)" required>
                <input type="number" step="0.01" id="estatura" placeholder="Estatura (m)" required>
                <input type="text" id="escolaridad" placeholder="Escolaridad" required>
                <input type="text" id="puesto" placeholder="Puesto" required>
            </div>
            <button type="submit" class="btn-principal">Agregar a la base de datos</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNokOSiV483vppPmDwtWs0nH1evzZwbjU",
            authDomain: "matriz-de-habilidades-c4bd5.firebaseapp.com",
            databaseURL: "https://matriz-de-habilidades-c4bd5-default-rtdb.firebaseio.com",
            projectId: "matriz-de-habilidades-c4bd5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'matriz_habilidades');

        let empleados = [];
        let criteriosPorPuesto = {};

        // Sincronizar lectura
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            empleados = data?.empleados || [];
            criteriosPorPuesto = data?.criterios || {};
            renderizarTabla();
        });

        // Sincronizar escritura
        const sincronizar = () => set(dbRef, { empleados, criterios: criteriosPorPuesto });

        // Agregar empleado
        document.getElementById("formEmpleado").addEventListener("submit", function(e) {
            e.preventDefault();
            let nuevo = {
                nombre: document.getElementById("nombre").value.trim(),
                puesto: document.getElementById("puesto").value.trim().toUpperCase(),
                cuadrilla: document.getElementById("cuadrilla").value,
                anios: document.getElementById("anios").value,
                peso: document.getElementById("peso").value,
                estatura: document.getElementById("estatura").value,
                escolaridad: document.getElementById("escolaridad").value,
                evaluacion: null, 
                detalleEvaluacion: [], // Nuevo arreglo para guardar los conceptos para el Excel
                fecha: "Pendiente"
            };
            empleados.push(nuevo);
            sincronizar();
            this.reset();
            alert("✅ Empleado registrado con éxito");
        });
    </script>
</body>
</html>
