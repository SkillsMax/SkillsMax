<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Habilidades</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Matriz de Habilidades</h1>

<h2>Registrar Empleado</h2>
<form id="formEmpleado">
    <input type="text" id="cuadrilla" placeholder="Cuadrilla" required>
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="number" id="anios" placeholder="Años" required>
    <input type="number" id="peso" placeholder="Peso (kg)" required>
    <input type="number" step="0.01" id="estatura" placeholder="Estatura (m)" required>
    <input type="text" id="escolaridad" placeholder="Escolaridad" required>
    <input type="text" id="puesto" placeholder="Puesto" required>
    <button type="submit">Agregar</button>
</form>

<h2>Empleados Registrados</h2>
<input type="text" id="buscarEmpleado" class="buscador" placeholder="🔍 Buscar empleado por nombre..." onkeyup="filtrarEmpleados()">

<div class="table-responsive">
    <table id="tablaEmpleados">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Puesto</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="evaluacion" class="oculto">
    <h2>Matriz de Evaluación</h2>
    <h3 id="tituloEmpleado"></h3>

    <div class="controles">
        <button onclick="agregarItem('habilidades')">+ Habilidad</button>
        <button onclick="agregarItem('conocimientos')">+ Conocimiento</button>
        <button onclick="agregarItem('antropometria')">+ Antropometría</button>
    </div>

    <div class="table-responsive">
        <table class="matriz">
            <thead>
                <tr>
                    <th>Concepto</th>
                    <th>0</th>
                    <th>1</th>
                    <th>2</th>
                    <th>3</th>
                    <th>4</th>
                </tr>
            </thead>
            <tbody id="tablaMatriz">
                <tr class="seccion" id="sec-habilidades"><td colspan="6">HABILIDADES</td></tr>
                <tr class="seccion" id="sec-conocimientos"><td colspan="6">CONOCIMIENTOS</td></tr>
                <tr class="seccion" id="sec-antropometria"><td colspan="6">MEDIDAS ANTROPOMÉTRICAS</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn-guardar" onclick="guardarEvaluacion()">Guardar Evaluación</button>
</div>
  
<h2>Matriz General</h2>
<div class="controles">
    <button onclick="exportarCSV()" style="background-color: #17a2b8;">Exportar a Excel (CSV)</button>
    <button onclick="limpiarTodo()" class="btn-eliminar">Borrar toda la base de datos</button>
</div>

<div class="table-responsive">
    <table id="tablaFinal">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Puesto</th>
                <th>Puntaje</th>
                <th>%</th>
                <th>Resultado</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  // TU CONFIGURACIÓN (La que me pasaste)
  const firebaseConfig = {
    apiKey: "AIzaSyCNokOSiV483vppPmDwtWs0nH1evzZwbjU",
    authDomain: "matriz-de-habilidades-c4bd5.firebaseapp.com",
    databaseURL: "https://matriz-de-habilidades-c4bd5-default-rtdb.firebaseio.com",
    projectId: "matriz-de-habilidades-c4bd5",
    storageBucket: "matriz-de-habilidades-c4bd5.firebasestorage.app",
    messagingSenderId: "190967468978",
    appId: "1:190967468978:web:8e40bde48a4a2355814aab"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Importamos la lógica de tu aplicación
  // (Asegúrate de que tu archivo JS se llame 'script.js')
  import { iniciarApp } from "./script.js";
  iniciarApp(db, ref, set, onValue, push);
</script>
</html>
